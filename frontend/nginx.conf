server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: if the requested path isn't a real file, serve
    # index.html so React Router can handle the route (e.g. /products on refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend container. The browser only ever
    # talks to this same origin (/api/...), so there are no CORS issues. The
    # trailing slash on proxy_pass strips the /api prefix:
    #   /api/products  ->  http://backend:8000/products
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
